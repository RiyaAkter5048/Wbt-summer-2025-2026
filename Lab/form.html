<!DOCTYPE html>
<html lang="en">
 
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donar Information</title>
</head>
 
<body>
 
  <!-- ===== Navigation Bar ===== -->
  <nav>
    <a href="Donation.html"> >1 Donation</a> |
    <a href="conformation.html"> >2 conformation</a> |
    <a href="Thank you.html"> >Thank you</a> |
  </nav>
 
  <hr>
 
  <h1>Donar Information</h1>

  <form action="#" method="post">
 
    <fieldset>
     
      <table>
        <tr>
          <td><label for="firstName">First Name*:</label></td>
          <td><input type="text" id="firstName" name="firstName" required></td>
        </tr>

        <tr>
          <td><label for="lastName">Last Name*:</label></td>
          <td><input type="text" id="lastName" name="lastName" required></td>
        </tr>

        <tr>
          <td><label for="Company">Company*:</label></td>
          <td><input type="text" id="Company" name="Company" required></td>
        </tr>

        <tr>
          <td><label for="address1">Address 1*:</label></td>
          <td><input type="text" id="address1" name="Address1" required></td>
        </tr>

        <tr>
          <td><label for="address2">Address 2*:</label></td>
          <td><input type="text" id="address2" name="Address2" required></td>
        </tr>

        <tr>
          <td><label for="City">City*:</label></td>
          <td><input type="text" id="City" name="City" required></td>
        </tr>

        <tr>
          <td><label for="state">State*:</label></td>
          <td>
            <select id="state" name="state">
              <option value="">Select a state</option>
              <option value="Cumilla">Cumilla</option>
              <option value="London">London</option>
            </select>
          </td>
        </tr>

        <tr>
          <td><label for="Zip">Zip code*:</label></td>
          <td><input type="text" id="Zip" name="Zip" pattern="[0-9]{5}" required></td>
        </tr>

        <tr>
          <td><label for="country">Country*:</label></td>
          <td>
            <select id="country" name="country">
              <option value="">Select a Country</option>
              <option value="Bangladesh">Bangladesh</option>
              <option value="Uk">Uk</option>
            </select>
          </td>
        </tr>

        <tr>
          <td><label for="Phone">Phone*:</label></td>
          <td><input type="text" id="Phone" name="Phone" pattern="[0-9]{11}" required></td>
        </tr>

        <tr>
          <td><label for="Fax">Fax*:</label></td>
          <td><input type="text" id="Fax" name="Fax" pattern="[0-9]{5}" required></td>
        </tr>

        <tr>
          <td><label for="Email">Email*:</label></td>
          <td><input type="email" id="Email" name="Email" required></td>
        </tr>

        <tr>
          <td><label>Donation Amount:<br>(Check a button or type in your amount)</label></td>
          <td>
            <input type="radio" name="amount" value="None" checked> None
            <input type="radio" name="amount" value="50"> $50
            <input type="radio" name="amount" value="75"> $75
            <input type="radio" name="amount" value="100"> $100
            <input type="radio" name="amount" value="250"> $250
            <input type="radio" name="amount" value="Other"> Other
          </td>
        </tr>

        <tr>
          <td><label>Other Amount $</label></td>
          <td>
            <input type="text" name="other_amount">
          </td>
        </tr>

        <tr>
          <td><label>Recurring Donation:<br>(Check if yes)</label></td>
          <td>
            <input type="checkbox" name="recurring"> I am interested in giving on a regular basis.<br><br>
            Monthly Credit Card $ <input type="text" name="monthly_amount" size="6">
            For <input type="text" name="recurring_months" size="4"> Months
          </td>
        </tr>

      </table>
    </fieldset>
  </form>

</body>
</html>
